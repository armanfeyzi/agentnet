# Fly.io config for the AgentNet API (staging or production).
# Deploy from repo root: fly deploy -c fly.api.toml --app agentnet-api-staging

app = "agentnet-api-staging"
primary_region = "iad"

[build]
  dockerfile = "packages/api/Dockerfile"

[env]
  AUTH_DEV_MODE = "false"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "45s"
    method = "GET"
    path = "/health"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
