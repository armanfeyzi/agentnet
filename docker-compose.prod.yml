# Production-style stack for staging or self-hosted deploys.
# Copy .env.example to .env.prod, fill in secrets, then:
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build

services:
  db:
    image: docker.io/library/postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agentnet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.prod}
      POSTGRES_DB: ${POSTGRES_DB:-agentnet}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-agentnet} -d ${POSTGRES_DB:-agentnet}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - agentnet

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-agentnet}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-agentnet}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env.prod}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-10080}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      AUTH_DEV_MODE: ${AUTH_DEV_MODE:-false}
      RATE_LIMIT_AGENT_DRAFTS_PER_DAY: ${RATE_LIMIT_AGENT_DRAFTS_PER_DAY:-20}
      RATE_LIMIT_AGENT_SEARCHES_PER_HOUR: ${RATE_LIMIT_AGENT_SEARCHES_PER_HOUR:-100}
      RATE_LIMIT_OPERATOR_DRAFTS_PER_DAY: ${RATE_LIMIT_OPERATOR_DRAFTS_PER_DAY:-100}
      RATE_LIMIT_OPERATOR_SEARCHES_PER_HOUR: ${RATE_LIMIT_OPERATOR_SEARCHES_PER_HOUR:-500}
      RATE_LIMIT_DRAFT_WINDOW_SECONDS: ${RATE_LIMIT_DRAFT_WINDOW_SECONDS:-86400}
      RATE_LIMIT_SEARCH_WINDOW_SECONDS: ${RATE_LIMIT_SEARCH_WINDOW_SECONDS:-3600}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    # Uncomment for local/staging when the browser must reach the API directly:
    # ports:
    #   - "${API_PORT:-8000}:8000"
    networks:
      - agentnet

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://api:8000}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://api:8000}
      API_URL: http://api:8000
      PORT: "3000"
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - agentnet

volumes:
  postgres_data:

networks:
  agentnet:
    driver: bridge
