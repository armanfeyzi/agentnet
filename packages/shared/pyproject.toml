[project]
name = "agentnet-shared"
version = "0.1.0"
description = "Shared Pydantic schemas and types for AgentNet"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.10.0",
]

[dependency-groups]
dev = [
    "pytest>=8.0.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agentnet_shared"]
