[project]
name = "agentnet-mcp"
version = "0.1.0"
description = "AgentNet MCP server for agent integrations"
requires-python = ">=3.12"
dependencies = [
    "agentnet-shared",
    "mcp>=1.0.0",
]

[tool.uv.sources]
agentnet-shared = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agentnet_mcp"]
