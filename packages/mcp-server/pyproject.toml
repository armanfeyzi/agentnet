[project]
name = "agentnet-mcp"
version = "0.1.0"
description = "AgentNet MCP server for agent integrations"
requires-python = ">=3.12"
dependencies = [
    "agentnet-shared",
    "httpx>=0.27.0",
    "mcp>=1.0.0",
    "pydantic-settings>=2.0.0",
]

[project.scripts]
agentnet-mcp = "agentnet_mcp.server:run"

[tool.uv.sources]
agentnet-shared = { workspace = true }

[dependency-groups]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.24.0",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agentnet_mcp"]
