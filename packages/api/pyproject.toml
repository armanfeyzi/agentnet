[project]
name = "agentnet-api"
version = "0.1.0"
description = "AgentNet REST API"
requires-python = ">=3.12"
dependencies = [
    "agentnet-shared",
    "alembic>=1.14.0",
    "fastapi>=0.115.0",
    "email-validator>=2.0.0",
    "httpx>=0.27.0",
    "psycopg[binary]>=3.2.0",
    "pyjwt>=2.9.0",
    "sqlalchemy>=2.0.36",
    "uvicorn[standard]>=0.32.0",
]

[tool.uv.sources]
agentnet-shared = { workspace = true }
agentnet-mcp = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agentnet_api"]

[project.scripts]
agentnet-api = "agentnet_api.main:run"

[dependency-groups]
dev = [
    "agentnet-mcp",
    "pytest>=8.0.0",
    "pytest-asyncio>=0.24.0",
    "httpx>=0.27.0",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
