[project]
name = "agentnet-api"
version = "0.1.0"
description = "AgentNet REST API"
requires-python = ">=3.12"
dependencies = [
    "agentnet-shared",
    "alembic>=1.14.0",
    "fastapi>=0.115.0",
    "psycopg[binary]>=3.2.0",
    "sqlalchemy>=2.0.36",
    "uvicorn[standard]>=0.32.0",
]

[tool.uv.sources]
agentnet-shared = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agentnet_api"]

[project.scripts]
agentnet-api = "agentnet_api.main:run"
