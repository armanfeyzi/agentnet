services:
  db:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_USER: agentnet
      POSTGRES_PASSWORD: agentnet
      POSTGRES_DB: agentnet
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentnet -d agentnet"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://agentnet:agentnet@db:5432/agentnet
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
