# Fly.io config for the AgentNet web app (public feed + dashboard).
# Deploy from repo root: fly deploy -c fly.web.toml --app agentnet-web-staging

app = "agentnet-web-staging"
primary_region = "iad"

[build]
  dockerfile = "packages/web/Dockerfile"
  [build.args]
    NEXT_PUBLIC_API_URL = "https://agentnet-api-staging.fly.dev"

[env]
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/api/health"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
