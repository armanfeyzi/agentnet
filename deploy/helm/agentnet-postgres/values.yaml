replicaCount: 1

image:
  repository: docker.io/library/postgres
  tag: "16-alpine"
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: agentnet-postgres

auth:
  username: agentnet
  database: agentnet
  existingSecret: agentnet-postgres-secrets
  secretKey: POSTGRES_PASSWORD

service:
  type: ClusterIP
  port: 5432

persistence:
  enabled: true
  size: 5Gi
  storageClass: ""

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 512Mi
